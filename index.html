<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>중2 과학 웹앱 허브</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2d3748">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🧪</text></svg>">
  
  <!-- Galmuri Font (Retro Pixel Art Style) -->
  <link href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" rel="stylesheet">
  
  <!-- Required CDNs (Versions strictly locked) -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Tailwind Config & Custom CSS -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            galmuri: ['Galmuri11', 'sans-serif'],
          },
          colors: {
            mc: {
              bg: '#8b8b8b',
              borderLight: '#ffffff',
              borderDark: '#373737',
              btn: '#c6c6c6',
              btnHover: '#dfdfdf',
              btnActive: '#8b8b8b',
              text: '#111111'
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: 'Galmuri11', sans-serif;
      background-color: #2d3748;
      background-image: 
        linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937),
        linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      margin: 0;
      color: white;
      overflow-x: hidden;
    }
    .h-screen-safe {
      height: 100dvh;
      height: calc(var(--vh, 1vh) * 100);
    }
    
    /* Retro Bevel Box CSS */
    .bevel-box {
      background-color: #c6c6c6;
      border: 4px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-bottom-color: #373737;
      border-right-color: #373737;
      color: #111;
      image-rendering: pixelated;
    }
    .bevel-btn {
      background-color: #c6c6c6;
      border: 4px solid;
      border-top-color: #ffffff;
      border-left-color: #ffffff;
      border-bottom-color: #373737;
      border-right-color: #373737;
      color: #111;
      cursor: pointer;
      user-select: none;
    }
    .bevel-btn:active {
      border-top-color: #373737;
      border-left-color: #373737;
      border-bottom-color: #ffffff;
      border-right-color: #ffffff;
      padding-top: 2px;
      padding-left: 2px;
    }
    .bevel-inset {
      background-color: #8b8b8b;
      border: 4px solid;
      border-top-color: #373737;
      border-left-color: #373737;
      border-bottom-color: #ffffff;
      border-right-color: #ffffff;
      color: white;
    }
    
    /* Fix viewport for iOS */
    canvas { touch-action: none; }
    .scrollable-panel { touch-action: pan-y; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: #8b8b8b; border-left: 2px solid #373737; }
    ::-webkit-scrollbar-thumb { background: #c6c6c6; border: 2px solid #ffffff; border-bottom-color: #373737; border-right-color: #373737; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- Configurations ---
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrzEGlT0g6rgRTDhWbPLzTk-7DhvURRhUwNxy3CZGfbsPoOD2OU4T71EngstHY8ArD/exec"; // TODO: 배포 후 여기에 앱스 스크립트 웹앱 URL 입력
    
    const UNITS = ['1단원', '2단원', '3단원', '4단원', '5단원', '6단원', '7단원', '8단원'];
    const DEFAULT_CATEGORIES = ['중1 과학', '중2 과학', '중3 과학', '수업 영상', '공지/정보'];
    
    const DUMMY_DATA = [
      { id: 'd1', category: '중2 과학', unit: '1단원', name: '원소 불꽃반응 실험', url: 'https://example.com/fire', emoji: '🔥', date: '2026-06-01' },
      { id: 'd2', category: '중2 과학', unit: '2단원', name: '전자기 유도 발전기', url: 'https://example.com/elec', emoji: '⚡', date: '2026-06-02' },
      { id: 'd3', category: '중3 과학', unit: '3단원', name: '태양계 행성 크기 비교', url: 'https://example.com/space', emoji: '🪐', date: '2026-06-03' },
      { id: 'd4', category: '중1 과학', unit: '4단원', name: '광합성 시뮬레이션', url: 'https://example.com/plant', emoji: '🌿', date: '2026-06-04' },
      { id: 'd5', category: '수업 영상', unit: '전체', name: '동물의 소화 기관', url: 'https://example.com/body', emoji: '🍖', date: '2026-06-05' },
    ];

    // --- Helper Functions ---
    const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    window.addEventListener('resize', setVH);
    setVH();

    // Copy to clipboard with fallback
    const copyToClipboard = async (text) => {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        throw new Error("Clipboard not available");
      } catch (err) {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.left = "-999999px";
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          textArea.remove();
          return true;
        } catch (fallbackErr) {
          console.error("Copy failed", fallbackErr);
          return false;
        }
      }
    };

    // --- Components ---

    const QRCodeViewer = ({ url, size = 64, onClick }) => {
      const qrRef = useRef(null);
      useEffect(() => {
        if (qrRef.current) {
          qrRef.current.innerHTML = '';
          new window.QRCode(qrRef.current, {
            text: url,
            width: size,
            height: size,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : window.QRCode.CorrectLevel.M
          });
        }
      }, [url, size]);

      return (
        <div 
          ref={qrRef} 
          onClick={onClick} 
          className={`bg-white p-1 bevel-inset inline-block ${onClick ? 'cursor-pointer hover:scale-105 transition-transform' : ''}`}
        ></div>
      );
    };

    const ModalOverlay = ({ children, onClose }) => (
      <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4" style={{ paddingBottom: 'max(16px, var(--safe-bottom))' }} onClick={onClose}>
        <div className="bevel-box w-full max-w-md max-h-[90dvh] overflow-y-auto scrollable-panel p-6 flex flex-col" onClick={e => e.stopPropagation()}>
          {children}
        </div>
      </div>
    );

    const AppFormModal = ({ initialData, categories, units, onSave, onClose }) => {
      const isEdit = !!initialData;
      const [formData, setFormData] = useState(isEdit ? initialData : { category: '중2 과학', unit: '1단원', name: '', url: '', emoji: '🧪' });
      
      // 명시적인 '직접 입력' 모드 상태 추가 (입력 도중 창이 사라지는 버그 방지)
      const [isCustomCat, setIsCustomCat] = useState(!categories.includes(formData.category));
      const [isCustomUnit, setIsCustomUnit] = useState(!units.includes(formData.unit));

      const handleSubmit = () => {
        if(!formData.name || !formData.url || !formData.emoji || !formData.category || !formData.unit) {
          alert('모든 필드를 입력해주세요.');
          return;
        }
        onSave(isEdit ? 'update' : 'create', formData);
      };

      return (
        <ModalOverlay onClose={onClose}>
          <h3 className="text-xl font-bold mb-4">{isEdit ? '웹앱 수정' : '새 웹앱 추가'}</h3>
          
          <label className="text-sm font-bold mb-1">대분류 (사이드바 탭)</label>
          <select 
            className={`bevel-inset p-2 w-full text-black bg-white ${isCustomCat ? 'mb-2' : 'mb-4'}`}
            value={isCustomCat ? 'custom' : formData.category}
            onChange={e => {
              if (e.target.value === 'custom') {
                setIsCustomCat(true);
                setFormData({...formData, category: ''});
              } else {
                setIsCustomCat(false);
                setFormData({...formData, category: e.target.value});
              }
            }}
          >
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
            <option value="custom">➕ 직접 입력 (새 대분류)</option>
          </select>
          {isCustomCat && (
            <input type="text" className="bevel-inset p-2 mb-4 w-full text-black bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} placeholder="새 대분류 이름 입력" />
          )}

          <label className="text-sm font-bold mb-1">소분류 (단원 등)</label>
          <select 
            className={`bevel-inset p-2 w-full text-black bg-white ${isCustomUnit ? 'mb-2' : 'mb-4'}`}
            value={isCustomUnit ? 'custom' : formData.unit}
            onChange={e => {
              if (e.target.value === 'custom') {
                setIsCustomUnit(true);
                setFormData({...formData, unit: ''});
              } else {
                setIsCustomUnit(false);
                setFormData({...formData, unit: e.target.value});
              }
            }}
          >
            {units.map(u => <option key={u} value={u}>{u}</option>)}
            <option value="custom">➕ 직접 입력 (새 소분류)</option>
          </select>
          {isCustomUnit && (
            <input type="text" className="bevel-inset p-2 mb-4 w-full text-black bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} placeholder="새 소분류 이름 입력" />
          )}

          <label className="text-sm font-bold mb-1 flex items-center justify-between">
            <span>이모지 아이콘 (1글자)</span>
            <span className="text-xs font-normal text-gray-600 bg-gray-200 px-1 rounded">💡 윈도우키 + 마침표(.)</span>
          </label>
          <input type="text" maxLength="2" className="bevel-inset p-2 mb-4 w-full text-black bg-white"
            value={formData.emoji} onChange={e => setFormData({...formData, emoji: e.target.value})} placeholder="🔬" />

          <label className="text-sm font-bold mb-1">앱 이름</label>
          <input type="text" className="bevel-inset p-2 mb-4 w-full text-black bg-white"
            value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="예: 화산 폭발 시뮬레이션" />

          <label className="text-sm font-bold mb-1">URL 링크</label>
          <input type="url" className="bevel-inset p-2 mb-6 w-full text-black bg-white"
            value={formData.url} onChange={e => setFormData({...formData, url: e.target.value})} placeholder="https://..." />

          <div className="flex justify-end gap-2 mt-auto">
            <button onClick={onClose} className="bevel-btn px-4 py-2 bg-gray-400">취소</button>
            <button onClick={handleSubmit} className="bevel-btn px-4 py-2 bg-blue-400 font-bold">저장</button>
          </div>
        </ModalOverlay>
      );
    };

    // --- Main Application ---
    const App = () => {
      const [view, setView] = useState('main'); // 'main', 'admin'
      const [apps, setApps] = useState([]);
      const [loading, setLoading] = useState(false);
      
      const [selectedCategory, setSelectedCategory] = useState('중2 과학');
      const [selectedUnit, setSelectedUnit] = useState('전체');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      
      const [adminPw, setAdminPw] = useState(''); // 현재 로그인된 비밀번호 세션 상태
      const [modal, setModal] = useState({ type: null, data: null }); // type: 'password', 'qr', 'guide', 'alert', 'appForm'

      // 관리자 패널용 전용 필터 상태
      const [adminCategoryFilter, setAdminCategoryFilter] = useState('전체');
      const [adminUnitFilter, setAdminUnitFilter] = useState('전체');

      // 카테고리 동적 생성 (기본값 + 등록된 앱의 카테고리들)
      const allCategories = useMemo(() => {
        const currentCats = apps.map(app => app.category).filter(Boolean);
        return Array.from(new Set([...DEFAULT_CATEGORIES, ...currentCats]));
      }, [apps]);

      // 소분류(단원) 동적 생성 (기본값 + 등록된 앱의 소분류들)
      const allUnits = useMemo(() => {
        const currentUnits = apps.map(app => app.unit).filter(Boolean);
        return Array.from(new Set([...UNITS, ...currentUnits]));
      }, [apps]);

      // Navigation Helper
      const navigate = (nextView) => {
        setView(nextView);
        window.history.pushState({ view: nextView }, '');
      };

      useEffect(() => {
        window.history.replaceState({ view: 'main' }, '');
        const onPop = (e) => {
          const v = e.state?.view;
          setView(['main', 'admin'].includes(v) ? v : 'main');
        };
        window.addEventListener('popstate', onPop);
        fetchApps();
        return () => window.removeEventListener('popstate', onPop);
      }, []);

      const fetchApps = async () => {
        if (!GOOGLE_SCRIPT_URL) {
          setApps(DUMMY_DATA);
          return;
        }
        setLoading(true);
        try {
          const res = await Promise.race([
            fetch(GOOGLE_SCRIPT_URL),
            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000))
          ]);
          const data = await res.json();
          setApps(Array.isArray(data) ? data : []);
        } catch(err) {
          console.error(err);
          setModal({ type: 'alert', data: '데이터를 불러오는데 실패했습니다. 네트워크를 확인하세요.' });
          setApps(DUMMY_DATA);
        } finally {
          setLoading(false);
        }
      };

      const syncAppAction = async (action, data, overridePw = null) => {
        const pwToUse = overridePw !== null ? overridePw : adminPw;
        
        if (!GOOGLE_SCRIPT_URL) {
          if (action === 'verify') {
            if (pwToUse === 'science123') return true;
            setModal({ type: 'alert', data: '임시 로컬 모드 비밀번호는 science123 입니다.' });
            return false;
          }
          setModal({ type: 'alert', data: 'GAS URL이 설정되지 않아 로컬 임시 환경에서만 동작합니다.' });
          // 로컬 상태 낙관적 업데이트
          if(action === 'create') setApps([...apps, { ...data, id: Date.now().toString(), date: new Date().toISOString() }]);
          if(action === 'delete') setApps(apps.filter(a => a.id !== data.id));
          if(action === 'update') setApps(apps.map(a => a.id === data.id ? data : a));
          return true;
        }
        
        setLoading(true);
        try {
          const res = await Promise.race([
            fetch(GOOGLE_SCRIPT_URL, {
              method: 'POST',
              // text/plain을 사용하여 CORS Preflight 요청을 우회하고 응답을 읽어옵니다.
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action, data, password: pwToUse })
            }),
            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 8000))
          ]);
          
          const resultData = await res.json();
          if (resultData.result === 'error') {
            setModal({ type: 'alert', data: resultData.message || '오류가 발생했습니다.' });
            return false;
          }
          
          if (action !== 'verify') {
            await fetchApps(); // 데이터베이스 변경 후 목록 갱신
          }
          return true;
        } catch(err) {
          setModal({ type: 'alert', data: '서버 통신 오류가 발생했습니다. 변경사항이 저장되지 않았을 수 있습니다.' });
          return false;
        } finally {
          setLoading(false);
        }
      };

      // Filtered Apps
      const displayedApps = useMemo(() => {
        let filtered = apps.filter(app => app.category === selectedCategory);
        if (selectedUnit !== '전체') {
          filtered = filtered.filter(app => app.unit === selectedUnit);
        }
        return filtered;
      }, [apps, selectedCategory, selectedUnit]);

      // 관리자 패널에서 사용할 소분류 목록 (선택한 대분류에 맞게 필터링)
      const adminAvailableUnits = useMemo(() => {
        if (adminCategoryFilter === '전체') return ['전체', ...allUnits];
        const unitsInCat = apps.filter(a => a.category === adminCategoryFilter).map(a => a.unit);
        return ['전체', ...Array.from(new Set(unitsInCat))];
      }, [apps, adminCategoryFilter, allUnits]);

      // 관리자 패널 전용으로 필터링된 앱 목록
      const adminDisplayedApps = useMemo(() => {
        let filtered = apps;
        if (adminCategoryFilter !== '전체') {
          filtered = filtered.filter(app => app.category === adminCategoryFilter);
        }
        if (adminUnitFilter !== '전체') {
          filtered = filtered.filter(app => app.unit === adminUnitFilter);
        }
        return filtered;
      }, [apps, adminCategoryFilter, adminUnitFilter]);

      // --- Render Functions ---

      const renderHeader = () => (
        <header className="sticky top-0 z-40 bg-[#2d3748] border-b-4 border-[#111] p-4 flex justify-between items-center" style={{ paddingTop: 'max(16px, var(--safe-top))' }}>
          <div className="flex items-center gap-3">
            <button 
              onClick={() => setIsSidebarOpen(true)}
              className="bevel-btn p-2 flex flex-col gap-1 bg-[#c6c6c6]"
            >
              <div className="w-5 h-1 bg-black"></div>
              <div className="w-5 h-1 bg-black"></div>
              <div className="w-5 h-1 bg-black"></div>
            </button>
            <h1 className="text-xl min-[480px]:text-2xl font-bold text-white flex items-center gap-2 drop-shadow-[2px_2px_0px_rgba(0,0,0,1)] whitespace-nowrap">
              <span className="text-3xl">🧪</span> 과학 허브
            </h1>
          </div>
          <div className="flex gap-2 relative">
            <button 
              onClick={() => setModal({ type: 'guide' })}
              className="bevel-btn px-2 py-1 text-sm font-bold flex items-center whitespace-nowrap"
            >
              ⚙️
            </button>
            {view === 'main' ? (
              <button 
                onClick={() => setModal({ type: 'password' })}
                className="bevel-btn px-2 py-1 text-sm font-bold flex items-center whitespace-nowrap"
              >
                🔒 관리
              </button>
            ) : (
              <button 
                onClick={() => navigate('main')}
                className="bevel-btn px-2 py-1 text-sm font-bold flex items-center whitespace-nowrap bg-yellow-400"
              >
                🏠 홈
              </button>
            )}
          </div>
        </header>
      );

      const renderSidebar = () => (
        <>
          {/* Sidebar Overlay */}
          {isSidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/60 z-50 transition-opacity" 
              onClick={() => setIsSidebarOpen(false)}
            />
          )}
          {/* Sidebar Menu */}
          <div className={`fixed inset-y-0 left-0 w-64 bg-[#c6c6c6] border-r-4 border-[#111] z-[60] transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-4 bg-[#8b8b8b] border-b-4 border-[#111] flex justify-between items-center" style={{ paddingTop: 'max(16px, var(--safe-top))' }}>
              <h2 className="text-xl font-bold text-white drop-shadow-md">메뉴 선택</h2>
              <button onClick={() => setIsSidebarOpen(false)} className="bevel-btn px-2 py-1 bg-red-400 text-white font-bold">X</button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3 scrollable-panel">
              {allCategories.map(cat => (
                <button 
                  key={cat}
                  onClick={() => {
                    setSelectedCategory(cat);
                    setSelectedUnit('전체'); // 카테고리 이동 시 단원 필터 초기화
                    setIsSidebarOpen(false);
                  }}
                  className={`py-3 px-4 font-bold text-left text-lg ${selectedCategory === cat ? 'bevel-inset bg-blue-300 text-black' : 'bevel-btn'}`}
                >
                  {cat}
                </button>
              ))}
            </div>
          </div>
        </>
      );

      const renderStudentView = () => (
        <main className="p-4 flex flex-col gap-4 flex-1 h-full w-full max-w-6xl mx-auto scrollable-panel pb-24">
          
          <div className="flex items-center gap-2 mb-2 border-b-2 border-white/20 pb-2">
            <span className="text-xl font-bold text-yellow-300">📂 {selectedCategory}</span>
          </div>

          {/* Unit Tabs */}
          <div className="flex flex-wrap gap-2 mb-4">
            {['전체', ...Array.from(new Set(apps.filter(a => a.category === selectedCategory).map(a => a.unit)))].map(unit => (
              <button
                key={unit}
                onClick={() => setSelectedUnit(unit)}
                className={`px-3 py-1 text-sm font-bold transition-colors ${selectedUnit === unit ? 'bevel-box bg-yellow-400' : 'bevel-btn'}`}
              >
                {unit}
              </button>
            ))}
          </div>

          {/* Cards Grid */}
          <div className="grid grid-cols-1 min-[480px]:grid-cols-2 lg:grid-cols-3 gap-6">
            {displayedApps.map(app => (
              <div key={app.id} className="bevel-box p-4 flex flex-col h-full bg-[#e5e5e5] hover:-translate-y-1 transition-transform">
                <div className="flex justify-between items-start mb-4">
                  <div className="flex items-center gap-3">
                    <div className="text-4xl p-2 bevel-inset bg-white drop-shadow-md">{app.emoji}</div>
                    <div>
                      <span className="text-xs bg-gray-700 text-white px-2 py-1 inline-block mb-1 font-bold">{app.unit}</span>
                      <h3 className="font-bold text-lg leading-tight break-keep">{app.name}</h3>
                    </div>
                  </div>
                  {/* QR Code */}
                  <div className="flex-shrink-0 ml-2">
                    <QRCodeViewer url={app.url} size={60} onClick={() => setModal({ type: 'qr', data: app })} />
                  </div>
                </div>
                
                <div className="mt-auto pt-2">
                  <button 
                    onClick={() => window.open(app.url, '_blank')}
                    className="bevel-btn w-full py-3 text-lg font-bold flex justify-center items-center gap-2 bg-green-400 hover:bg-green-300 active:bg-green-500"
                  >
                    ▶ OPEN APP
                  </button>
                </div>
              </div>
            ))}
            {displayedApps.length === 0 && (
              <div className="col-span-full bevel-inset p-8 text-center text-white font-bold text-xl">
                이 카테고리에 등록된 웹앱이 없습니다. 🪹
              </div>
            )}
          </div>
        </main>
      );

      const renderAdminView = () => {
        return (
          <main className="p-4 flex flex-col gap-4 flex-1 h-full w-full max-w-5xl mx-auto scrollable-panel pb-24">
            <div className="flex justify-between items-end mb-4 flex-wrap gap-4">
              <h2 className="text-2xl font-bold flex items-center gap-2 drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">
                <span className="text-3xl">🛠️</span> 관리자 패널
              </h2>
              <button 
                onClick={() => setModal({ type: 'appForm', data: null })}
                className="bevel-btn bg-blue-400 px-6 py-2 font-bold flex items-center gap-2"
              >
                ➕ 새 웹앱 추가
              </button>
            </div>

            {/* 관리자 패널 전용 필터 영역 */}
            <div className="flex flex-wrap gap-3 mb-2 p-3 bg-[#8b8b8b] bevel-inset items-center rounded-sm">
              <span className="font-bold text-sm text-white drop-shadow-md mr-2">🔍 목록 필터:</span>
              <select 
                className="bevel-btn bg-white p-2 text-sm font-bold"
                value={adminCategoryFilter}
                onChange={e => {
                  setAdminCategoryFilter(e.target.value);
                  setAdminUnitFilter('전체'); // 대분류가 바뀌면 소분류 필터 초기화
                }}
              >
                <option value="전체">모든 대분류 보기</option>
                {allCategories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select 
                className="bevel-btn bg-white p-2 text-sm font-bold"
                value={adminUnitFilter}
                onChange={e => setAdminUnitFilter(e.target.value)}
              >
                {adminAvailableUnits.map(u => <option key={u} value={u}>{u === '전체' ? '모든 소분류 보기' : u}</option>)}
              </select>
              
              <div className="ml-auto text-xs font-bold bg-[#373737] text-white px-3 py-2 border-2 border-[#ffffff] border-b-[#111111] border-r-[#111111]">
                총 {adminDisplayedApps.length}개
              </div>
            </div>

            <div className="bevel-box overflow-x-auto bg-[#c6c6c6] p-2">
              <table className="w-full text-sm text-left min-w-[700px]">
                <thead className="bg-[#8b8b8b] text-white">
                  <tr>
                    <th className="p-3 border-2 border-[#373737]">대분류</th>
                    <th className="p-3 border-2 border-[#373737]">소분류</th>
                    <th className="p-3 border-2 border-[#373737]">이모지</th>
                    <th className="p-3 border-2 border-[#373737]">앱 이름</th>
                    <th className="p-3 border-2 border-[#373737]">URL 링크</th>
                    <th className="p-3 border-2 border-[#373737]">관리</th>
                  </tr>
                </thead>
                <tbody className="bg-white">
                  {adminDisplayedApps.map(app => (
                    <tr key={app.id} className="border-b-2 border-[#c6c6c6] hover:bg-gray-100">
                      <td className="p-3 border-2 border-[#373737] font-bold text-blue-700">{app.category || '미지정'}</td>
                      <td className="p-3 border-2 border-[#373737] font-bold">{app.unit}</td>
                      <td className="p-3 border-2 border-[#373737] text-2xl text-center">{app.emoji}</td>
                      <td className="p-3 border-2 border-[#373737] font-bold">{app.name}</td>
                      <td className="p-3 border-2 border-[#373737] text-blue-600 truncate max-w-[200px]">{app.url}</td>
                      <td className="p-3 border-2 border-[#373737]">
                        <div className="flex gap-2">
                          <button onClick={() => setModal({ type: 'appForm', data: app })} className="bevel-btn px-2 py-1 bg-yellow-300 text-xs font-bold">수정</button>
                          <button onClick={() => {
                            if(window.confirm('정말 삭제하시겠습니까?')) syncAppAction('delete', { id: app.id });
                          }} className="bevel-btn px-2 py-1 bg-red-400 text-xs font-bold">삭제</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {adminDisplayedApps.length === 0 && (
                    <tr><td colSpan="6" className="p-4 text-center font-bold">검색 조건에 맞는 데이터가 없습니다.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </main>
        );
      };

      // --- Modals ---
      const renderModals = () => {
        if (!modal.type) return null;

        if (modal.type === 'password') {
          return (
            <ModalOverlay>
              <h3 className="text-xl font-bold mb-4">관리자 인증</h3>
              <p className="mb-4 text-sm text-gray-700">비밀번호를 입력하세요.</p>
              <input type="password" id="pwInput" className="bevel-inset w-full p-3 mb-6 text-black" autoFocus />
              <div className="flex justify-end gap-2 mt-auto">
                <button onClick={() => setModal({ type: null })} className="bevel-btn px-4 py-2 bg-gray-400">취소</button>
                <button onClick={async () => {
                  const inputPw = document.getElementById('pwInput').value;
                  if (!inputPw) return;
                  const isValid = await syncAppAction('verify', null, inputPw);
                  if (isValid) {
                    setAdminPw(inputPw);
                    setModal({ type: null });
                    navigate('admin');
                  }
                }} className="bevel-btn px-4 py-2 bg-blue-400 font-bold">확인</button>
              </div>
            </ModalOverlay>
          );
        }

        if (modal.type === 'alert') {
          return (
            <ModalOverlay>
              <h3 className="text-xl font-bold mb-4 text-red-600">알림</h3>
              <p className="mb-6">{modal.data}</p>
              <div className="flex justify-end mt-auto">
                <button onClick={() => setModal({ type: null })} className="bevel-btn px-6 py-2 bg-blue-400 font-bold">확인</button>
              </div>
            </ModalOverlay>
          );
        }

        if (modal.type === 'qr') {
          const app = modal.data;
          return (
            <ModalOverlay>
              <div className="flex flex-col items-center p-4">
                <h3 className="text-2xl font-bold mb-2">{app.name}</h3>
                <p className="mb-6 text-sm text-gray-700 bg-gray-200 p-2 break-all">{app.url}</p>
                <div className="bg-white p-4 bevel-inset mb-6">
                  <QRCodeViewer url={app.url} size={200} />
                </div>
                <button onClick={() => setModal({ type: null })} className="bevel-btn w-full py-3 bg-red-400 font-bold text-lg">닫기</button>
              </div>
            </ModalOverlay>
          );
        }

        if (modal.type === 'appForm') {
          return (
            <AppFormModal 
              initialData={modal.data}
              categories={allCategories}
              units={allUnits}
              onClose={() => setModal({ type: null })}
              onSave={(action, formData) => {
                syncAppAction(action, formData).then(success => {
                  if(success) setModal({ type: null });
                });
              }}
            />
          );
        }

        if (modal.type === 'guide') {
          const gasCodeText = `// 1. 구글 스프레드시트 생성 후 상단 메뉴 [확장 프로그램] > [Apps Script] 클릭
// 2. 아래 코드를 모두 복사하여 붙여넣기
// 3. 우측 상단 [배포] > [새 배포] > 유형: '웹 앱'
// 4. 실행하는 사용자: '나', 액세스 권한: '모든 사용자' 설정 후 배포
// 5. 생성된 '웹 앱 URL'을 복사하여 index.html 내 GOOGLE_SCRIPT_URL 변수에 붙여넣기

function doGet(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName('Apps');
  if(!sheet) return ContentService.createTextOutput(JSON.stringify([])).setMimeType(ContentService.MimeType.JSON);
  
  var data = sheet.getDataRange().getValues();
  if(data.length < 2) return ContentService.createTextOutput(JSON.stringify([])).setMimeType(ContentService.MimeType.JSON);
  
  var headers = data[0];
  var result = [];
  for(var i=1; i<data.length; i++) {
    var obj = {};
    for(var j=0; j<headers.length; j++) {
      obj[headers[j]] = data[i][j];
    }
    result.push(obj);
  }
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // 데이터 시트 초기화 (카테고리 컬럼 추가됨)
  var sheet = ss.getSheetByName('Apps');
  if(!sheet) {
    sheet = ss.insertSheet('Apps');
    sheet.appendRow(['id', 'category', 'unit', 'name', 'url', 'emoji', 'date']);
    sheet.getRange(1, 1, 1, 7).setFontWeight('bold').setBackground('#4a86e8').setFontColor('#ffffff');
  }
  
  // 관리자 설정 시트 초기화 및 비밀번호 가져오기
  var settingsSheet = ss.getSheetByName('Settings');
  if(!settingsSheet) {
    settingsSheet = ss.insertSheet('Settings');
    settingsSheet.appendRow(['관리자 비밀번호', 'science123']);
    settingsSheet.getRange(1, 1, 1, 2).setFontWeight('bold').setBackground('#f4cccc');
    settingsSheet.setColumnWidth(1, 150);
  }
  var actualPassword = settingsSheet.getRange(1, 2).getValue().toString();
  
  try {
    var req = JSON.parse(e.postData.contents);
    var action = req.action;
    var data = req.data;
    var inputPassword = (req.password || '').toString();
    
    // 비밀번호 검증
    if (inputPassword !== actualPassword) {
      return ContentService.createTextOutput(JSON.stringify({ result: 'error', message: '비밀번호가 일치하지 않습니다.' })).setMimeType(ContentService.MimeType.JSON);
    }
    
    // 인증 성공 후 분기
    if (action === 'verify') {
      return ContentService.createTextOutput(JSON.stringify({ result: 'success' })).setMimeType(ContentService.MimeType.JSON);
    } else if (action === 'create') {
      var newId = Utilities.getUuid();
      var date = new Date().toISOString();
      sheet.appendRow([newId, data.category || '미지정', data.unit || '전체', data.name, data.url, data.emoji, date]);
    } else if (action === 'delete') {
      var sheetData = sheet.getDataRange().getValues();
      for(var i=1; i<sheetData.length; i++) {
        if(sheetData[i][0] === data.id) {
          sheet.deleteRow(i+1);
          break;
        }
      }
    } else if (action === 'update') {
      var sheetData = sheet.getDataRange().getValues();
      for(var i=1; i<sheetData.length; i++) {
        if(sheetData[i][0] === data.id) {
          sheet.getRange(i+1, 2).setValue(data.category);
          sheet.getRange(i+1, 3).setValue(data.unit);
          sheet.getRange(i+1, 4).setValue(data.name);
          sheet.getRange(i+1, 5).setValue(data.url);
          sheet.getRange(i+1, 6).setValue(data.emoji);
          break;
        }
      }
    }
    return ContentService.createTextOutput(JSON.stringify({ result: 'success' })).setMimeType(ContentService.MimeType.JSON);
  } catch(error) {
    return ContentService.createTextOutput(JSON.stringify({ result: 'error', message: error.toString() })).setMimeType(ContentService.MimeType.JSON);
  }
}
`;
          return (
            <ModalOverlay>
              <h3 className="text-xl font-bold mb-4 flex items-center gap-2">⚙️ DB 연동 가이드</h3>
              <div className="bg-[#1e1e1e] text-[#d4d4d4] p-4 font-mono text-xs overflow-auto h-64 bevel-inset mb-4 text-left whitespace-pre">
                {gasCodeText}
              </div>
              <div className="text-sm space-y-2 mb-4 font-bold text-gray-800">
                <p>1. 구글 스프레드시트 준비 (헤더는 자동 생성됨)</p>
                <p>2. 위 코드를 Apps Script에 붙여넣기</p>
                <p>3. 웹 앱으로 배포 (모든 사용자 권한)</p>
                <p>4. iOS Safari 공유 버튼 > '홈 화면에 추가'를 통해 앱처럼 사용 가능</p>
              </div>
              <div className="flex justify-between mt-auto">
                <button 
                  onClick={async (e) => {
                    const btn = e.target;
                    const original = btn.innerText;
                    const success = await copyToClipboard(gasCodeText);
                    btn.innerText = success ? '✅ 복사됨' : '❌ 복사 실패';
                    setTimeout(() => btn.innerText = original, 2000);
                  }} 
                  className="bevel-btn px-4 py-2 bg-green-400 font-bold"
                >
                  📄 코드 복사하기
                </button>
                <button onClick={() => setModal({ type: null })} className="bevel-btn px-4 py-2 bg-red-400 font-bold text-white">닫기</button>
              </div>
            </ModalOverlay>
          );
        }

        return null;
      };

      return (
        <div className="h-screen-safe flex flex-col relative w-full overflow-hidden bg-mc-bg">
          {renderSidebar()}
          {renderHeader()}
          
          <div className="flex-1 overflow-y-auto relative z-10 w-full scrollable-panel">
            {view === 'main' ? renderStudentView() : renderAdminView()}
          </div>

          <footer className="text-center p-2 bg-[#2d3748] border-t-4 border-[#111] z-40 text-xs font-bold" style={{ paddingBottom: 'max(8px, var(--safe-bottom))' }}>
            Created by Yang DH
          </footer>

          {/* Loading Overlay */}
          {loading && (
            <div className="fixed inset-0 z-[200] bg-black/70 flex flex-col items-center justify-center backdrop-blur-sm">
              <div className="text-6xl animate-bounce drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">⛏️</div>
              <div className="mt-4 text-white font-bold text-xl tracking-widest animate-pulse">블록 채굴 중...</div>
            </div>
          )}

          {renderModals()}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
